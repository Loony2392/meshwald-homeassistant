name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # "brands" verlangt einen gemergten Eintrag im offiziellen
          # home-assistant/brands-Repo – das ist nur für die Aufnahme in den
          # HACS-Standard-Store nötig, nicht für die Nutzung als eigenes
          # "Custom Repository". Für dieses persönliche Projekt übersprungen.
          ignore: "brands"

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
